name: Nightly

# Tests plugin against formae main branch to catch SDK regressions before release.
# PEL-maintained plugins only.

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC
  workflow_dispatch:

jobs:
  # Integration tests run against real OCI resources.
  # Runs before conformance tests to avoid VCN quota contention (limit=2).
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Configure OCI credentials
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          tenancy=${OCI_TENANCY_OCID}
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=${HOME}/.oci/oci_api_key.pem
          region=${OCI_REGION}
          EOF
          echo "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Run integration tests
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
        run: make test-integration

  # Build formae from main and the plugin once, share via artifact.
  # Saves ~3 minutes per matrix job (clone + build + pip install).
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build formae from main
        run: |
          git clone --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          git fetch --tags --unshallow
          make build
          cp /tmp/formae/formae /tmp/formae-binary

      - name: Build and install plugin
        run: make install

      - name: Upload formae binary
        uses: actions/upload-artifact@v4
        with:
          name: formae-binary
          path: /tmp/formae-binary
          retention-days: 1

      - name: Upload installed plugin
        uses: actions/upload-artifact@v4
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/
          retention-days: 1

  conformance-tests-main:
    needs: [build, test-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      max-parallel: 1  # OCI VCN limit is 2 per region; sequential to avoid quota contention
      matrix:
        resource:
          - policy
          - vcn
          - volume
          - bucket
          - networksecuritygroup
          - internetgateway
          - routetable
          - securitylist
          - subnet
          - dhcpoptions
          - nsg_securityrule
          # Excluded (service limits in us-chicago-1):
          # natgateway, servicegateway, instance, cluster, nodepool, virtualnodepool

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae binary
        uses: actions/download-artifact@v4
        with:
          name: formae-binary
          path: /tmp

      - name: Download installed plugin
        uses: actions/download-artifact@v4
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/

      - name: Prepare binaries
        run: |
          chmod +x /tmp/formae-binary
          chmod +x ~/.pel/formae/plugins/oci/*/oci
          echo "FORMAE_BINARY=/tmp/formae-binary" >> $GITHUB_ENV

      - name: Configure OCI credentials
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          tenancy=${OCI_TENANCY_OCID}
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=${HOME}/.oci/oci_api_key.pem
          region=${OCI_REGION}
          EOF
          echo "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Install OCI CLI
        run: |
          pip install oci-cli
          oci --version

      - name: Wait for VCN quota availability
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
        run: ./scripts/ci/wait-for-vcn-quota.sh

      - name: Run conformance tests against main (${{ matrix.resource }})
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          FORMAE_TEST_RUN_ID: nightly-main-${{ github.run_id }}-${{ matrix.resource }}
          FORMAE_TEST_FILTER: ${{ matrix.resource }}
          FORMAE_TEST_TIMEOUT: "10"
        run: make conformance-test

  # Clean up OCI resources after all matrix jobs complete
  cleanup:
    needs: [conformance-tests-main]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Configure OCI credentials
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          tenancy=${OCI_TENANCY_OCID}
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          key_file=${HOME}/.oci/oci_api_key.pem
          region=${OCI_REGION}
          EOF
          echo "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Install OCI CLI
        run: |
          pip install oci-cli
          oci --version

      - name: Clean up test resources
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
        run: ./scripts/ci/clean-environment.sh

  # Notify when nightly is fixed (was red, now green)
  notify-fixed:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              per_page: 2,
              status: 'completed'
            });

            // Get previous run (skip current which isn't completed yet)
            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);

            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Nightly fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Nightly fixed* on `${{ github.repository }}`\n\nPlugin conformance tests now passing against formae main branch."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Notify on failure
  notify-failure:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: Nightly build failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Nightly build failed* on `${{ github.repository }}`\n\nPlugin conformance tests failed against formae main branch. This may indicate an SDK regression."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
